<html>
<head>
  <!-- Embed web font with fallback -->
  <style type="text/css">
    /* For supported email clients */
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');
    *, body, table, td, a {
      font-family: 'Inter', Arial, sans-serif;
    }
  </style>
</head>
<body style="font-family: 'Inter', Arial, sans-serif; line-height: 1.6; color: #333;">
    <div style="max-width: 600px; margin: 0 auto; padding: 20px;">
        <img style="width: 150px;" width="150" src="https://tornatura.it/tmp-storage/assets/images/logo-color-black.png" />

        <div style="margin-top: 30px;">
            <h2 style="color: #3D401A;">Ottime notizie!</h2>

            <p>Ciao {{ inviterName }},</p>

            <p><strong>{{ inviteeName }}</strong> ha accettato il tuo invito a unirsi a <strong>{{ organizationName }}</strong> come <strong>{{ role }}</strong>.</p>

            <div style="text-align: center; margin: 30px 0;">
                <a style="padding: 12px 30px; border-radius: 5px; text-decoration: none; display: inline-block; background-color: #3D401A; color: #EAFF00; font-weight: bold;"
                   href="{{ organizationLink }}">Visualizza Organizzazione</a>
            </div>

            <hr style="border: none; border-top: 1px solid #ddd; margin: 30px 0;">

            <p style="color: #777; font-size: 12px;">Cordiali saluti,<br>Il Team Tornatura</p>

            <p style="color: #999; font-size: 11px;">Questa è un'email automatica. Si prega di non rispondere.</p>
        </div>
    </div>
</body>
</html>
