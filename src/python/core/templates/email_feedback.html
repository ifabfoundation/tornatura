<html>
  <head>
    <!-- Embed web font with fallback -->
    <style type="text/css">
      /* For supported email clients */
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap");
      *,
      body,
      table,
      td,
      a {
        font-family: "Inter", Arial, sans-serif;
      }
    </style>
  </head>
  <body style="font-family: 'Inter', Arial, sans-serif">
    <img
      style="width: 150px"
      width="150"
      src="https://tornatura.it/tmp-storage/assets/images/logo-color-black.png"
    />
    <h3>Buongiorno Team</h3>
    <p>&Egrave; stato ricevuto un nuovo feedback</p>
    <p>
      <strong>Nome:</strong> {{name}}<br />
      <strong>Email:</strong> {{email}}<br />
      <strong>Telefono:</strong> {{phone}}<br />
      <strong>Messaggio:</strong> {{message}}
    <p>
      <a
        style="
          padding: 10px 15px;
          border-radius: 5px;
          text-decoration: none;
          display: inline-block;
          background-color: #3d401a;
          color: #eaff00;
        "
        href="{{link}}"
        >Accedi</a
      >
    </p>
  </body>
</html>
