server {
  listen 80;
  server_name localhost;
  root /usr/share/nginx/html;
  
  # 1) Never fallback to index.html for static assets:
  location ~* \.(pdf|woff2)$ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # (Optional but recommended) cover more common static assets too:
  location ~* \.(css|js|map|png|jpg|jpeg|gif|svg|ico|webp|avif|ttf|otf|woff|eot)$ {
    try_files $uri =404;
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # 2) SPA routing fallback:
  location / {
    try_files $uri $uri/ /index.html;
  }

  error_log /dev/stdout;
  access_log /dev/stdout;
}